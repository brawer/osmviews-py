#
# Automatically generated release notes.
# https://docs.github.com/en/repositories/releasing-projects-on-github/automatically-generated-release-notes

changelog:
  exclude:
    labels:
      - ignore-for-release
  categories:
    - title: 🎉 New Features
      labels:
        - enhancement
    - title: 🐛 Bug Fixes
      labels:
        - bug
    - title: 🏎️ Performance
      labels:
        - performance
    - title: 📚 Documentation
      labels:
        - documentation
    - title: 🤖 Dependencies
      labels:
        - dependencies
    - title: 🔧 Other Changes
      labels:
        - "*"
